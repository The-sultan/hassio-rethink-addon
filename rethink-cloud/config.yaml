---
name: "rethink-cloud — local LG ThinQ server"
slug: rethink-cloud
version: "0.2.4"
description: >-
  Local server that emulates the LG ThinQ cloud (anszom/rethink), so your LG
  appliances talk to Home Assistant instead of LG's servers. Built from upstream
  source at install time.
url: https://github.com/The-sultan/hassio-rethink-addon/tree/main/rethink-cloud
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
# host_network is REQUIRED for the port invariant: rethink uses each port value
# both to bind AND to advertise to the device (provisioning.ts). On the host
# network the port the add-on binds IS the port reachable on the LAN IS the port
# told to the device — no NAT in between. See the SECURITY note in README.
host_network: true
#
# NOTE: this add-on deliberately does NOT use the Supervisor API. Earlier
# versions read options/ports via bashio (which calls the Supervisor API) and
# hit persistent "403 forbidden / no token" failures on host_network installs.
# run.sh now reads everything straight from /data/options.json with jq, so no
# hassio_api / hassio_role grant is needed and there is no token to break.
# Because of that, the ports are configured here as OPTIONS (not in the Network
# section, which would require the API to read back).
options:
  hostname: homeassistant
  mqtt_url: "mqtt://localhost:1883"
  mqtt_user: ""
  mqtt_pass: ""
  discovery_prefix: homeassistant
  rethink_prefix: rethink
  https_port: 4433
  mqtts_port: 8884
  mqtt_port: 1884
  thinq1_https_port: 46030
  thinq1_port: 47878
  management_port: 44401
  log_level:
    - status
    - incoming
    - HTTPS
    - publish
    - MGMT
schema:
  hostname: str
  mqtt_url: str
  mqtt_user: str?
  mqtt_pass: password?
  discovery_prefix: str
  rethink_prefix: str
  https_port: int(1,65535)
  mqtts_port: int(1,65535)
  mqtt_port: int(1,65535)
  thinq1_https_port: int(1,65535)
  thinq1_port: int(1,65535)
  management_port: int(1,65535)
  log_level:
    - "list(status|incoming|HTTPS|publish|MGMT)"
